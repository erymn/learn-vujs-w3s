<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v-show Basic Learn</title>
</head>

<body>
    <div id="app">
        <div v-show="showDiv">
            This div tag can be hidden
        </div>
        <div v-if="showDiv">
            This div tag is destroyed when using v-if
        </div>
        <p>'showDiv: ' {{showDiv}}</p>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    showDiv: false
                }
            }
        })

        app.mount('#app');
    </script>
</body>

</html>
