<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Template HTML</title>
    <style></style>
  </head>

  <body>
    <div id="app"></div>

    <script src="vue.global.js"></script>
    <script>
      const app = Vue.createApp({
        template: `<h1>{{message}}</h1>
            <p>This is second line of HTML Code</p>`,
        data() {
          return {
            message: "Hello from template",
          };
        },
      });

      app.mount("#app");
    </script>
  </body>
</html>
