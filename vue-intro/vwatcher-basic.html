<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Watcher</title>
    <style>
      form {
        border: dashed black 1px;
        display: inline-block;
        padding: 10px;
      }
      label {
        padding: 5px;
      }
      label:hover {
        cursor: pointer;
        background-color: lightgray;
        border-radius: 5px;
      }
     
    #app {
      border: dashed black 1px;
      display: inline-block;
      padding: 10px;
    }
    #app > div {
      width: 200px;
      height: 50px;
      border: solid black 1px;
      background-color: lightgreen;
    }
    #app > p {
      font-size: large;
      font-weight: bold;
      text-align: center;
    }
    </style>
  </head>

  <body>
    <p>A watcher is a method that watches a data property with the same name.</p>
    <p>A watcher runs every time the data property value changes. </p>
    <p>Use a watcher if a certain data property value requires an action. </p>
    </h5>
    <div id="app">
        <input type="range" v-model="rangeVal">
        <p>{{rangeVal}}</p>

        <br/>
        <p>A Watcher with New and Old Values</p>
        <div v-on:click="updatePos"></div>
        <p>xPos: {{xPos}}, xDiff: {{xDiff}}</p>
    </div>

    <script src="vue.global.js"></script>
    <script>
      const app = Vue.createApp({
        data() {
          return {
            rangeVal: 70,
            xPos: 0,
            xDiff: 0
          };
        },
        methods: {
            updatePos(evt){
               this.xPos = evt.offsetX
            }
        },
        computed: {},
        watch: {
            rangeVal(val) {
                if(val>20 && val <60){
                    if(val<40){
                        this.rangeVal=20
                    }else{
                        this.rangeVal=60
                    }
                }
            },
            xPos(new1, old1){
                this.xDiff = new1 - old1
            }
        },
      });

      app.mount("#app");
    </script>
  </body>
</html>
