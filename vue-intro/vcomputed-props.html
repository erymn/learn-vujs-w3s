<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Computed Properties</title>
    <style>
      form {
        border: dashed black 1px;
        display: inline-block;
        padding: 10px;
      }
      label {
        padding: 5px;
      }
      label:hover {
        cursor: pointer;
        background-color: lightgray;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <h3>Contoh Computed Property 'yes' atau 'no'</h3>
    <div id="app">
      <form>
        Important Item?
        <label>
          <input type="checkbox" v-model="chkBoxVal" /> {{isImportant}}
        </label>
      </form>
    </div>

    <script src="vue.global.js"></script>
    <script>
      const app = Vue.createApp({
        data() {
          return {
            chkBoxVal: false,
          };
        },
        computed: {
          isImportant() {
            if (this.chkBoxVal) {
              return "yes";
            } else {
              return "no";
            }
          },
        },
      });

      app.mount("#app");
    </script>
  </body>
</html>
